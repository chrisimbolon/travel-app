[alembic]
# path to migration scripts
script_location = alembic

# ensures Python can find "app" module
prepend_sys_path = .

# this is a placeholder — WILL be overridden by env.py (.env)
sqlalchemy.url = postgresql://user:password@localhost:5432/dbname


# -------------------------
# LOGGING CONFIG
# -------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


# Root logger
[logger_root]
level = WARN
handlers = console
qualname =


# SQLAlchemy logger
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


# Alembic logger
[logger_alembic]
level = INFO
handlers =
qualname = alembic


# Console output
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


# Log format
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S